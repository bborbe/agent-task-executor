apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-task-executor
  namespace: '{{ "NAMESPACE" | env }}'
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - agent.benjamin-borbe.de
    resources:
      - configs
    verbs:
      - get
      - list
      - watch
